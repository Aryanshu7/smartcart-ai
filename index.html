<!DOCTYPE html>
<html>
<head>
    <title>SmartCart AI</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        #webcam-container {
            margin-top: 20px;
        }

        canvas {
            border: 4px solid black;
            border-radius: 10px;
        }

        #product-info {
            margin-top: 20px;
            font-size: 18px;
            background: white;
            display: inline-block;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <h1>SmartCart AI - Shopping Assistant</h1>

    <button onclick="init()">Start Camera</button>

    <div id="webcam-container"></div>

    <h2>Product:</h2>
    <div id="product-info">No product detected</div>

    <!-- Local TensorFlow -->
    <script src="tf.min.js"></script>

    <!-- Local Teachable Machine -->
    <script src="teachablemachine-image.min.js"></script>

    <!-- Your Script -->
    <script src="script.js"></script>

</body>
</html>
